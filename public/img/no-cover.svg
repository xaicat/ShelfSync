<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
    <!-- Dark glassmorphic background -->
    <rect width="400" height="600" fill="#0f0f14" />
    <rect width="400" height="600" fill="url(#glass-gradient)" />
    
    <!-- Inner border -->
    <rect x="20" y="20" width="360" height="560" rx="10" fill="none" stroke="rgba(0, 212, 255, 0.15)" stroke-width="2" />
    
    <!-- Icon -->
    <g transform="translate(150, 220)">
        <path d="M48,0 C21.49,0 0,21.49 0,48 C0,74.51 21.49,96 48,96 C74.51,96 96,74.51 96,48 C96,21.49 74.51,0 48,0 Z M48,86.4 C26.79,86.4 9.6,69.21 9.6,48 C9.6,26.79 26.79,9.6 48,9.6 C69.21,9.6 86.4,26.79 86.4,48 C86.4,69.21 69.21,86.4 48,86.4 Z" fill="rgba(80, 80, 95, 0.5)" />
        <path d="M43.2,24 L43.2,52.8 L52.8,52.8 L52.8,24 L43.2,24 Z" fill="rgba(80, 80, 95, 0.8)" />
        <circle cx="48" cy="67.2" r="5" fill="rgba(80, 80, 95, 0.8)" />
    </g>

    <!-- Text -->
    <text x="200" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="700" fill="rgba(255, 255, 255, 0.6)" text-anchor="middle" letter-spacing="1">COVER NOT</text>
    <text x="200" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="700" fill="rgba(255, 255, 255, 0.6)" text-anchor="middle" letter-spacing="1">AVAILABLE</text>

    <!-- Subtext -->
    <text x="200" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" fill="rgba(255, 255, 255, 0.3)" text-anchor="middle">ShelfSync Library System</text>

    <defs>
        <linearGradient id="glass-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(37, 99, 235, 0.05)" />
            <stop offset="50%" stop-color="rgba(0, 0, 0, 0)" />
            <stop offset="100%" stop-color="rgba(0, 212, 255, 0.05)" />
        </linearGradient>
    </defs>
</svg>
